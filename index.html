<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Scenario Mobile RPG v0.2</title>
    <!-- グローバルおよびモバイルUI用のスタイル。絶対パスではなく相対パスで読み込む -->
    <link rel="stylesheet" href="./src/styles/global.css" />
    <link rel="stylesheet" href="./src/styles/mobile-ui.css" />
    <link rel="stylesheet" href="./src/styles/playtest-notes.css?v=20260502_v0_2_notes_arch_fix_01" />
  </head>
  <body>
    <div id="app">
      <!-- Canvas for rendering the map and actors. -->
      <canvas id="gameCanvas"></canvas>

      <!-- Mobile control overlay. Contains a simple D‑pad and an action button. -->
      <div id="ui">
        <div id="dpad" class="dpad">
          <button id="btn-up" class="dpad-btn up" aria-label="Move up">▲</button>
          <button id="btn-left" class="dpad-btn left" aria-label="Move left">◀︎</button>
          <button id="btn-right" class="dpad-btn right" aria-label="Move right">▶︎</button>
          <button id="btn-down" class="dpad-btn down" aria-label="Move down">▼</button>
        </div>
        <button id="actionButton" class="action-btn" aria-label="Action">決定</button>
      </div>

      <!-- Dialogue overlay. Hidden by default. -->
      <div id="dialogue" class="dialogue hidden" role="dialog">
        <div id="dialogueSpeaker" class="dialogue-speaker"></div>
        <div id="dialogueText" class="dialogue-text"></div>
      </div>

      <!-- Debug overlay for development. Shows runtime information when
           ?debug=1 is present in the URL. -->
      <div id="debugOverlay" class="debug-overlay hidden"></div>
    </div>
    <!-- コンパイル済みスクリプトを読み込む。キャッシュ破棄用にバージョン文字列を付与する -->
    <!-- Update the version query parameter to match the new build ID. -->
    <script type="module" src="./compiled/main.js?v=20260502_v0_2_notes_arch_fix_01"></script>
  </body>
</html>
